name: Daily HK Stock Scanner

on:
  schedule:
    # 每天 UTC 時間 08:30 執行 (大約是香港/台灣時間下午 16:30，港股剛收盤)
    - cron: '30 8 * * *'
  workflow_dispatch: # 允許你隨時手動點擊執行按鈕

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Scanner
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Automated daily update of dashboard" || echo "No changes to commit"
          git push origin main
